<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dance Cardio – Complete Goddess</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0010;color:#f0e6ff;font-family:'Segoe UI',sans-serif;min-height:100vh;padding:16px}
  h1{background:linear-gradient(135deg,#d946ef,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1.7rem;text-align:center;margin-bottom:4px}
  .sub{text-align:center;color:#c084fc;font-size:.85rem;margin-bottom:18px}
  .back-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(168,85,247,.15);border:1px solid #7c3aed;color:#c084fc;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:.82rem;text-decoration:none;margin-bottom:16px}
  .back-btn:hover{background:rgba(168,85,247,.3)}
  .phase-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.78rem;font-weight:700;letter-spacing:.5px;margin-bottom:4px}
  .phase-foundation{background:rgba(139,92,246,.25);border:1px solid #7c3aed;color:#c084fc}
  .phase-build{background:rgba(34,197,94,.15);border:1px solid #16a34a;color:#4ade80}
  .phase-peak{background:rgba(236,72,153,.2);border:1px solid #db2777;color:#f472b6}
  .section{background:rgba(255,255,255,.04);border:1px solid rgba(168,85,247,.2);border-radius:14px;padding:16px;margin-bottom:16px}
  .section-title{color:#c084fc;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
  .toggle-row{display:flex;gap:8px;margin-bottom:14px}
  .toggle-btn{flex:1;padding:9px;border-radius:10px;border:1px solid rgba(168,85,247,.3);background:rgba(255,255,255,.05);color:#c084fc;cursor:pointer;font-size:.85rem;transition:all .2s}
  .toggle-btn.active{background:linear-gradient(135deg,#7c3aed,#db2777);border-color:transparent;color:#fff;font-weight:700}
  .session-card{background:rgba(255,255,255,.04);border:1px solid rgba(168,85,247,.15);border-radius:12px;padding:14px;margin-bottom:12px}
  .session-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .style-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
  .style-afro{background:linear-gradient(135deg,#f59e0b,#d97706)}
  .style-hiphop{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}
  .style-latin{background:linear-gradient(135deg,#ef4444,#dc2626)}
  .style-burlesque{background:linear-gradient(135deg,#be185d,#9d174d)}
  .session-name{font-weight:700;font-size:1rem;color:#f0e6ff}
  .session-sub{font-size:.78rem;color:#a78bfa;margin-top:2px}
  .video-section{margin-bottom:14px}
  .video-label{font-size:.78rem;color:#a78bfa;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
  .video-card{background:rgba(255,255,255,.05);border:1px solid rgba(168,85,247,.2);border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px;text-decoration:none;transition:background .2s}
  .video-card:hover{background:rgba(168,85,247,.15)}
  .video-thumb{width:44px;height:44px;border-radius:8px;flex-shrink:0;background:rgba(168,85,247,.2);display:flex;align-items:center;justify-content:center;font-size:1.3rem}
  .video-info{flex:1;min-width:0}
  .video-title{font-size:.85rem;color:#f0e6ff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .video-meta{font-size:.73rem;color:#a78bfa;margin-top:2px}
  .play-icon{color:#d946ef;font-size:1.1rem;flex-shrink:0}
  .log-section{border-top:1px solid rgba(168,85,247,.15);padding-top:12px}
  .log-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  label{font-size:.78rem;color:#a78bfa;display:block;margin-bottom:3px}
  select,input,textarea{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(168,85,247,.3);color:#f0e6ff;border-radius:8px;padding:8px 10px;font-size:.85rem}
  select option{background:#1a0030}
  textarea{resize:vertical;min-height:60px}
  .log-btn{background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:.88rem;font-weight:700;cursor:pointer;width:100%;margin-top:8px}
  .log-btn:hover{opacity:.9}
  .history-toggle{background:none;border:1px solid rgba(168,85,247,.3);color:#c084fc;border-radius:8px;padding:6px 14px;font-size:.78rem;cursor:pointer;width:100%;margin-top:12px}
  .history-toggle:hover{background:rgba(168,85,247,.1)}
  .history-group{margin-top:10px}
  .history-date{color:#a78bfa;font-size:.75rem;font-weight:700;margin:8px 0 4px;text-transform:uppercase;letter-spacing:.5px}
  .history-entry{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-bottom:6px;font-size:.82rem;color:#d8b4fe;position:relative}
  .history-entry .meta{color:#7c3aed;font-size:.75rem;margin-bottom:4px;font-weight:700}
  .delete-btn{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171;border-radius:6px;padding:3px 8px;font-size:.72rem;cursor:pointer;float:right}
  .delete-btn:hover{background:rgba(239,68,68,.3)}
  .effort-stars{display:flex;gap:4px;margin-top:4px}
  .star{font-size:1rem;cursor:pointer;opacity:.4;transition:opacity .15s}
  .star.on{opacity:1}
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
  .stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(168,85,247,.15);border-radius:10px;padding:10px;text-align:center}
  .stat-val{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#d946ef,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .stat-lbl{font-size:.7rem;color:#a78bfa;margin-top:2px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;padding:10px 22px;border-radius:20px;font-size:.85rem;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
  .toast.show{opacity:1}
  .cal-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .cal-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;border:1px solid rgba(168,85,247,.2);color:#6b21a8}
  .cal-dot.done{background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;border-color:transparent}
  .cal-dot.today{border-color:#d946ef;color:#d946ef}
  .prog-bar-wrap{background:rgba(255,255,255,.15);border-radius:20px;height:6px;overflow:hidden;margin-top:6px}
  .prog-bar{height:100%;border-radius:20px;background:rgba(255,255,255,.9);transition:width .4s}
</style>
</head>
<body>
<a class="back-btn" href="https://fletch1980.github.io/Complete_goddess/" target="_self">← Complete Goddess</a>
<h1>💃 Dance Cardio</h1>
<div class="sub">Afrobeats · Hip Hop · Latin · Burlesque · 4×/week · Free on YouTube</div>

<div id="phaseArea" style="text-align:center;margin-bottom:14px"></div>
<div class="stats-row" id="statsRow"></div>

<div class="section">
  <div class="section-title">Week</div>
  <div id="weekGrid" style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px;"></div>
</div>

<div class="section">
  <div class="section-title">Today's Session</div>
  <div class="toggle-row" id="dayToggle"></div>
  <div id="sessionArea"></div>
</div>

<div class="section">
  <div class="section-title">This Week's Attendance</div>
  <div class="cal-row" id="calRow"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Data — plain JS -->
<script>
var STORAGE_PREFIX_DCD='dcd_';
var SESSIONS_TO_ADVANCE_DCD=4;
var DAYS=['Wed','Thu','Sat','Sun'];
var DAY_FULL={Wed:'Wednesday',Thu:'Thursday',Sat:'Saturday',Sun:'Sunday'};

var SESSIONS={
  Wed:{style:'Hip Hop / Twerk',icon:'🔥',cls:'style-hiphop'},
  Thu:{style:'Burlesque',icon:'💋',cls:'style-burlesque'},
  Sat:{style:'Afrobeats',icon:'🌍',cls:'style-afro'},
  Sun:{style:'Latin (Salsa / Reggaeton)',icon:'💃',cls:'style-latin'}
};

var VIDEOS={
  hiphop:[
    {title:'Hip Shake Fitness — Twerk Cardio 30 min',channel:'Hip Shake Fitness',dur:'30 min',url:'https://www.youtube.com/results?search_query=hip+shake+fitness+twerk+cardio+workout'},
    {title:'Hip Shake Fitness — Hip Hop Dance Workout',channel:'Hip Shake Fitness',dur:'25 min',url:'https://www.youtube.com/results?search_query=hip+shake+fitness+hip+hop+dance+workout'},
    {title:'Hip Shake Fitness — Tone N Twerk',channel:'Hip Shake Fitness',dur:'28 min',url:'https://www.youtube.com/results?search_query=hip+shake+fitness+tone+n+twerk'}
  ],
  burlesque:[
    {title:'Hip Shake Fitness — Burlesque Burn Workout',channel:'Hip Shake Fitness',dur:'20 min',url:'https://www.youtube.com/results?search_query=hip+shake+fitness+burlesque+burn+workout'},
    {title:'Hip Shake Fitness — Burlesque Chair Dance',channel:'Hip Shake Fitness',dur:'25 min',url:'https://www.youtube.com/results?search_query=hip+shake+fitness+burlesque+chair+dance+workout'},
    {title:'Hip Shake Fitness — Beginner Burlesque Moves',channel:'Hip Shake Fitness',dur:'20 min',url:'https://www.youtube.com/results?search_query=hip+shake+fitness+beginner+burlesque+dance+moves'}
  ],
  afro:[
    {title:'GrowWithJo — Afrobeats Dance Workout',channel:'GrowWithJo',dur:'30 min',url:'https://www.youtube.com/results?search_query=growwithjo+afrobeats+dance+workout'},
    {title:'Kukuwa Fitness — African Dance Cardio',channel:'Kukuwa Fitness',dur:'25 min',url:'https://www.youtube.com/results?search_query=kukuwa+fitness+african+dance+cardio+workout'},
    {title:'GrowWithJo — Afro Dance Cardio Full Body',channel:'GrowWithJo',dur:'28 min',url:'https://www.youtube.com/results?search_query=growwithjo+afro+dance+cardio+full+body'}
  ],
  latin:[
    {title:'Zumba with Dovydas — Latin Dance Party',channel:'Zumba with Dovydas',dur:'30 min',url:'https://www.youtube.com/results?search_query=zumba+with+dovydas+latin+dance+workout'},
    {title:'POPSUGAR Fitness — Latin Dance Cardio 30 min',channel:'POPSUGAR Fitness',dur:'30 min',url:'https://www.youtube.com/results?search_query=popsugar+fitness+latin+dance+cardio+30+min'},
    {title:'Zumba with Dovydas — Salsa Reggaeton Mix',channel:'Zumba with Dovydas',dur:'28 min',url:'https://www.youtube.com/results?search_query=zumba+dovydas+salsa+reggaeton+workout'}
  ]
};

var STYLE_KEY={Wed:'hiphop',Thu:'burlesque',Sat:'afro',Sun:'latin'};
var DURATION={1:'25 min',2:'25 min',3:'26 min',4:'26 min',5:'27 min',6:'27 min',7:'28 min',8:'28 min',9:'29 min',10:'29 min',11:'30 min',12:'30 min'};
var INTENSITY={1:'High',2:'High',3:'High',4:'High',5:'Very High',6:'Very High',7:'Very High',8:'Very High',9:'Peak',10:'Peak',11:'Peak',12:'Peak'};
var TIPS={1:'Focus on just moving to the beat — don\'t worry about getting it perfect.',2:'Try to feel each style\'s rhythm differently: Burlesque is slow and intentional, Afro is grounded, Hip Hop is sharp, Latin is smooth.',3:'Let your hips lead in everything. Your arms and expression follow.',4:'Pick one move per session to really nail this week.',5:'Push the intensity — you\'ve got the basics now.',6:'Try not to stop. Keep moving even when it gets hard.',7:'Focus on transitions between moves — that\'s where style lives.',8:'Match your energy to the beat, not the other way around.',9:'Go all out. This is peak phase.',10:'Commit fully — full range of motion, full expression.',11:'Dance like nobody\'s watching. Max effort.',12:'Celebrate how far you\'ve come. Dance your heart out.'};

function safeGetDCD(k){try{return localStorage.getItem(k);}catch(e){try{return sessionStorage.getItem(k);}catch(e2){return null;}}}
function safeSetDCD(k,v){try{localStorage.setItem(k,v);}catch(e){try{sessionStorage.setItem(k,v);}catch(e2){}}}

function recordSessionDCD(dateStr,weekNum){
  var key=STORAGE_PREFIX_DCD+'sessions_w'+weekNum;
  var sessions=JSON.parse(safeGetDCD(key)||'[]');
  if(sessions.indexOf(dateStr)===-1){sessions.push(dateStr);safeSetDCD(key,JSON.stringify(sessions));}
}
function calcWeekDCD(){
  var week=1;
  for(var w=1;w<=12;w++){
    var sessions=JSON.parse(safeGetDCD(STORAGE_PREFIX_DCD+'sessions_w'+w)||'[]');
    if(sessions.length>=SESSIONS_TO_ADVANCE_DCD){week=w<12?w+1:12;}
    else{week=w;break;}
  }
  return week;
}
function getSessionCountDCD(weekNum){
  return JSON.parse(safeGetDCD(STORAGE_PREFIX_DCD+'sessions_w'+weekNum)||'[]').length;
}
function getPhaseClass(w){return w<=4?'phase-foundation':w<=8?'phase-build':'phase-peak';}
function getPhase(w){return w<=4?'Foundation':w<=8?'Build':'Peak';}
</script>

<!-- App logic -->
<script>
function safeGet(k){try{return localStorage.getItem(k);}catch(e){try{return sessionStorage.getItem(k);}catch(e2){return null;}}}
function safeSet(k,v){try{localStorage.setItem(k,v);}catch(e){try{sessionStorage.setItem(k,v);}catch(e2){}}}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

var state={
  day:DAYS.includes(new Date().toLocaleDateString('en-US',{weekday:'short'}))?new Date().toLocaleDateString('en-US',{weekday:'short'}):'Wed',
  logs:JSON.parse(safeGet(STORAGE_PREFIX_DCD+'logs')||'[]'),
  historyOpen:{},
  effort:{},
  viewWeek:null
};

function saveLogs(){safeSet(STORAGE_PREFIX_DCD+'logs',JSON.stringify(state.logs));}

function renderPhase(w){
  document.getElementById('phaseArea').innerHTML=
    '<span class="phase-badge '+getPhaseClass(w)+'">Week '+w+' · '+getPhase(w)+' Phase</span>';
}

function renderStats(){
  var w=calcWeekDCD();
  var sc=getSessionCountDCD(w);
  var total=state.logs.length;
  document.getElementById('statsRow').innerHTML=
    '<div class="stat-card"><div class="stat-val">'+total+'</div><div class="stat-lbl">Total Sessions</div></div>'+
    '<div class="stat-card"><div class="stat-val">'+sc+'</div><div class="stat-lbl">This Week</div></div>'+
    '<div class="stat-card"><div class="stat-val">'+Math.round(total*27.5)+'</div><div class="stat-lbl">~Mins Danced</div></div>';
}

function renderDayToggle(){
  var d=document.getElementById('dayToggle');d.innerHTML='';
  DAYS.forEach(function(day){
    var b=document.createElement('button');
    b.className='toggle-btn'+(state.day===day?' active':'');
    b.textContent=DAY_FULL[day];
    b.onclick=function(){state.day=day;render();};
    d.appendChild(b);
  });
}

function renderSession(){
  var autoWeek=calcWeekDCD();
  var w=state.viewWeek||autoWeek;
  var sc=getSessionCountDCD(autoWeek);
  var d=state.day,sk=STYLE_KEY[d],sess=SESSIONS[d];
  var dur=DURATION[w],inten=INTENSITY[w],tip=TIPS[w];
  var vids=VIDEOS[sk];
  var primaryVid=vids[(w-1)%3],altVid=vids[w%3];

  var videosHTML=
    '<div class="video-section">'+
    '<div class="video-label">▶ Dance Along – Free on YouTube</div>'+
    '<a class="video-card" href="'+primaryVid.url+'" target="_blank" rel="noopener">'+
      '<div class="video-thumb">🎬</div>'+
      '<div class="video-info"><div class="video-title">'+primaryVid.title+'</div><div class="video-meta">'+primaryVid.channel+' · ~'+primaryVid.dur+' · Tap to search YouTube</div></div>'+
      '<div class="play-icon">▶</div></a>'+
    '<a class="video-card" href="'+altVid.url+'" target="_blank" rel="noopener">'+
      '<div class="video-thumb">🎬</div>'+
      '<div class="video-info"><div class="video-title">'+altVid.title+'</div><div class="video-meta">'+altVid.channel+' · ~'+altVid.dur+' · Tap to search YouTube</div></div>'+
      '<div class="play-icon">▶</div></a>'+
    '</div>';

  var effortKey=w+'_'+d;
  var ef=state.effort[effortKey]||0;
  var stars=[1,2,3,4,5].map(function(i){return '<span class="star '+(i<=ef?'on':'')+'" onclick="setEffort(\''+effortKey+'\','+i+')">⭐</span>';}).join('');

  var loggedAll=state.logs.filter(function(l){return l.day===d&&l.week===w;});
  var histOpen=state.historyOpen[d];
  var histHTML='';
  if(loggedAll.length>0&&histOpen){
    var byDate={};
    loggedAll.forEach(function(l){(byDate[l.date]=byDate[l.date]||[]).push(l);});
    histHTML=Object.entries(byDate).sort(function(a,b){return b[0].localeCompare(a[0]);}).map(function(pair){
      var date=pair[0],entries=pair[1];
      return '<div class="history-group"><div class="history-date">'+date+'</div>'+
        entries.map(function(e){
          return '<div class="history-entry">'+
            '<button class="delete-btn" onclick="deleteLog(\''+e.id+'\')">✕</button>'+
            '<div class="meta">'+e.style+' · Week '+e.week+' · '+e.duration+'</div>'+
            (e.effort?'<div>Effort: '+'⭐'.repeat(e.effort)+'</div>':'')+
            (e.mood?'<div>Mood: '+e.mood+'</div>':'')+
            (e.calories?'<div>~Calories: '+e.calories+'</div>':'')+
            (e.notes?'<div style="margin-top:4px;color:#f0e6ff">'+e.notes+'</div>':'')+
            '</div>';
        }).join('')+'</div>';
    }).join('');
  }

  // Session progress bar
  var progPct=Math.min(100,Math.round(sc/SESSIONS_TO_ADVANCE_DCD*100));
  var progHTML=
    '<div style="margin-bottom:12px">'+
    '<div style="font-size:.78rem;color:rgba(255,255,255,.8);margin-bottom:4px">'+
      sc+' of '+SESSIONS_TO_ADVANCE_DCD+' sessions done this week'+(sc>=SESSIONS_TO_ADVANCE_DCD?' · ✅ Advancing next session!':'')+
    '</div>'+
    '<div class="prog-bar-wrap"><div class="prog-bar" style="width:'+progPct+'%"></div></div>'+
    '</div>';

  document.getElementById('sessionArea').innerHTML=
    '<div class="session-card">'+
      '<div class="session-header">'+
        '<div class="style-icon '+sess.cls+'">'+sess.icon+'</div>'+
        '<div><div class="session-name">'+sess.style+'</div><div class="session-sub">'+dur+' · '+inten+' Intensity · Week '+w+'</div></div>'+
      '</div>'+
      progHTML+
      '<div style="background:rgba(168,85,247,.08);border-left:3px solid #a855f7;padding:9px 12px;border-radius:0 8px 8px 0;font-size:.83rem;color:#e9d5ff;margin-bottom:14px">'+
        '💡 <strong>Week '+w+' Focus:</strong> '+tip+
      '</div>'+
      videosHTML+
      '<div class="log-section">'+
        '<div class="section-title" style="margin-bottom:10px">Log This Session</div>'+
        '<div class="log-row">'+
          '<div style="flex:1;min-width:130px"><label>Date</label><input type="date" id="logDate" value="'+new Date().toISOString().split('T')[0]+'"/></div>'+
          '<div style="flex:1;min-width:110px"><label>~Calories Burned</label><input type="number" id="logCal" placeholder="e.g. 220" min="50" max="600"/></div>'+
        '</div>'+
        '<div class="log-row">'+
          '<div style="flex:1;min-width:130px"><label>Mood / Energy</label>'+
            '<select id="logMood"><option value="">Select...</option><option>🔥 High energy</option><option>😊 Feeling good</option><option>😐 Neutral</option><option>😴 Low energy</option><option>💪 Pushed through it</option></select>'+
          '</div>'+
          '<div style="flex:1"><label>Effort Level</label><div class="effort-stars">'+stars+'</div></div>'+
        '</div>'+
        '<div><label>Notes (optional)</label><textarea id="logNotes" placeholder="How\'d it feel? Any videos you loved?"></textarea></div>'+
        '<button class="log-btn" onclick="logSession()">✓ Log Session</button>'+
      '</div>'+
      (loggedAll.length>0?'<button class="history-toggle" onclick="toggleHistory(\''+d+'\')">'+(histOpen?'▲ Hide':'▼ Show')+' History ('+loggedAll.length+')</button>':'')+
      histHTML+
    '</div>';
}

function renderCalendar(){
  var today=new Date(),monday=new Date(today);
  monday.setDate(today.getDate()-((today.getDay()+6)%7));
  var row=document.getElementById('calRow');row.innerHTML='';
  for(var i=0;i<7;i++){
    var d=new Date(monday);d.setDate(monday.getDate()+i);
    var ds=d.toISOString().split('T')[0];
    var done=state.logs.some(function(l){return l.date===ds;});
    var isToday=ds===today.toISOString().split('T')[0];
    var dot=document.createElement('div');
    dot.className='cal-dot'+(done?' done':'')+(isToday&&!done?' today':'');
    dot.textContent=d.getDate();
    row.appendChild(dot);
  }
}

window.setEffort=function(key,val){state.effort[key]=val;renderSession();};
window.toggleHistory=function(d){state.historyOpen[d]=!state.historyOpen[d];renderSession();};
window.deleteLog=function(id){state.logs=state.logs.filter(function(l){return l.id!==id;});saveLogs();render();showToast('Entry deleted');};
window.logSession=function(){
  var date=document.getElementById('logDate').value;
  var cal=document.getElementById('logCal').value;
  var mood=document.getElementById('logMood').value;
  var notes=document.getElementById('logNotes').value.trim();
  var w=calcWeekDCD();
  var effortKey=w+'_'+state.day;
  var effort=state.effort[effortKey]||0;
  if(!date){showToast('Please pick a date');return;}
  state.logs.push({id:Date.now().toString(),week:w,day:state.day,date:date,style:SESSIONS[state.day].style,duration:DURATION[w],calories:cal||'',mood:mood,notes:notes,effort:effort});
  saveLogs();
  recordSessionDCD(date,w);
  render();
  showToast('Session logged! 💃');
};

function renderWeekGrid(){
  var autoWeek=calcWeekDCD();
  var viewWeek=state.viewWeek||autoWeek;
  var g=document.getElementById('weekGrid');g.innerHTML='';
  for(var i=1;i<=12;i++){
    (function(w){
      var isActive=(w===viewWeek);
      var btn=document.createElement('div');
      btn.style.cssText='background:'+(isActive?'linear-gradient(135deg,#7c3aed,#db2777)':'rgba(255,255,255,.06)')+';border:1px solid '+(isActive?'transparent':'rgba(168,85,247,.2)')+';color:'+(isActive?'#fff':'#d8b4fe')+';border-radius:8px;padding:8px 4px;font-size:.8rem;font-weight:'+(isActive?'700':'400')+';text-align:center;cursor:pointer;';
      btn.textContent='Wk '+w;
      btn.onclick=function(){state.viewWeek=w;render();};
      g.appendChild(btn);
    })(i);
  }
}

function render(){
  var w=calcWeekDCD();
  renderPhase(w);
  renderStats();
  renderWeekGrid();
  renderDayToggle();
  renderSession();
  renderCalendar();
}

render();
</script>
